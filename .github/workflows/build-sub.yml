            "https://raw.githubusercontent.com/chongdong1230/dxz/main/clash"
            "https://raw.githubusercontent.com/imboys/proxyForClash/refs/heads/master/free%20proxy.yml"
            "https://raw.githubusercontent.com/Barabama/FreeNodes/refs/heads/main/nodes/yudou66.yaml"
            "https://raw.githubusercontent.com/Barabama/FreeNodes/refs/heads/main/nodes/wenode.yaml"
            "https://raw.githubusercontent.com/Barabama/FreeNodes/refs/heads/main/nodes/nodefree.yaml"
            "https://raw.githubusercontent.com/Barabama/FreeNodes/refs/heads/main/nodes/nodev2ray.yaml"
            "https://raw.githubusercontent.com/Barabama/FreeNodes/refs/heads/main/nodes/ndnode.yaml"
            "https://raw.githubusercontent.com/Barabama/FreeNodes/refs/heads/main/nodes/clashmeta.yaml"
            "https://raw.githubusercontent.com/Barabama/FreeNodes/refs/heads/main/nodes/v2rayshare.yaml"
            "https://raw.githubusercontent.com/moneyfly1/sublist/main/clash.yml"
            "https://raw.githubusercontent.com/NiceVPN123/NiceVPN/main/Clash.yaml"
            "https://raw.githubusercontent.com/pojiezhiyuanjun/2023/master/0804clash.yml"
            "https://raw.githubusercontent.com/MhdiTaheri/V2rayCollector/main/sub/vmess"
            "https://raw.githubusercontent.com/Surfboardv2ray/TGParse/main/splitted/hy2"
            "https://raw.githubusercontent.com/Surfboardv2ray/TGParse/main/splitted/hysteria2"
            "https://raw.githubusercontent.com/SANYIMOE/VPN-free/4cf1dfd9e9b1f612a60f8796f43ea17f2bca0727/conf/data.txt"
            "https://raw.githubusercontent.com/SANYIMOE/VPN-free/5b5c8c09aa665169692ffcb48fed7c786bf0e737/conf/data.txt"
            "https://raw.githubusercontent.com/SANYIMOE/VPN-free/bfd7d84e84ef6fbbd89352dea17fdbcb8ac3e29a/conf/data.txt"
            "https://raw.githubusercontent.com/SANYIMOE/VPN-free/9ecbfd0efd89256e136f7b8c4558dc94fe1905af/conf/data.txt"
            "https://raw.githubusercontent.com/SANYIMOE/VPN-free/6e93041767a76c3104062551b003f29ea55f584e/conf/data.txt"
            "https://raw.githubusercontent.com/Epodonios/v2ray-configs/main/Splitted-By-Protocol/ssr.txt"
            "https://raw.githubusercontent.com/Epodonios/v2ray-configs/main/Splitted-By-Protocol/vmess.txt"
            "https://raw.githubusercontent.com/hiddify/hiddify-app/refs/heads/main/test.configs/mahsa#lilsorin-@isor1n"
            "https://raw.githubusercontent.com/hiddify/hiddify-app/refs/heads/main/test.configs/mahsa"
            "https://raw.githubusercontent.com/iampedii/whitedns-sub/refs/heads/main/base64.txt"
          )
          counter=1
          for url in "${urls[@]}"; do
            filename="configs/external_${counter}.txt"
            curl -sL "$url" -o "$filename"
            echo "Downloaded $url -> $filename, lines: $(wc -l < "$filename")"
            ((counter++))
          done

      # ============================================
      # مرحله 3: جمع‌آوری، تست و انتخاب بهترین کانفیگ‌های خارجی
      # (با fallback به shuf در صورت خطای xray-knife)
      # ============================================
      - name: Collect, test and select best external configs
        run: |
          # جمع‌آوری همه لینک‌های معتبر از فایل‌های external_
          > external_all.txt
          for f in configs/external_*.txt; do
            if [ -f "$f" ]; then
              grep -E "^(vmess|vless|trojan|ss|ssr|tuic|hysteria2|socks)://" "$f" >> external_all.txt 2>/dev/null || true
            fi
          done
          
          total_ext=$(wc -l < external_all.txt)
          echo "📊 تعداد کل کانفیگ‌های خارجی جمع‌آوری شده: $total_ext"
          
          if [ "$total_ext" -eq 0 ]; then
            echo "⚠️ هیچ کانفیگ خارجی یافت نشد. فایل خالی ساخته می‌شود."
            touch external_best.txt
          else
            echo "🔄 در حال تست و انتخاب 2500 کانفیگ برتر (بر اساس کمترین تاخیر) با xray-knife..."
            set +e  # غیرفعال کردن exit-on-error برای این بخش
            xray-knife speed -f external_all.txt \
              --test-only \
              --max-latency 1000 \
              --sort-by latency \
              --limit 2500 \
              --format plain > external_best.txt 2>&1
            KNIFE_EXIT=$?
            set -e
            
            if [ $KNIFE_EXIT -eq 0 ] && [ -s external_best.txt ]; then
              selected=$(wc -l < external_best.txt)
              echo "✅ موفقیت: $selected کانفیگ برتر انتخاب شد (مرتب شده بر اساس تاخیر، حداکثر 2500)"
            else
              echo "⚠️ xray-knife با خطا مواجه شد (کد خروج $KNIFE_EXIT). استفاده از روش جایگزین: انتخاب 2500 کانفیگ تصادفی."
              shuf -n 2500 external_all.txt > external_best.txt
              selected=$(wc -l < external_best.txt)
              echo "✅ روش جایگزین: $selected کانفیگ تصادفی انتخاب شد."
            fi
          fi

      # ============================================
      # مرحله 4: ترکیب کانفیگ‌های شخصی (مرتب بر اساس زمان کامیت) + بهترین کانفیگ‌های خارجی
      # ============================================
      - name: Merge personal configs (sorted) and best external configs
        run: |
          > sub.txt
          
          # ---------- بخش شخصی (فایل‌هایی که با external_ شروع نمی‌شوند) ----------
          personal_files=()
          for f in configs/*.txt; do
            if [[ ! "$f" =~ external_[0-9]+\.txt$ ]]; then
              personal_files+=("$f")
            fi
          done
          
          if [ ${#personal_files[@]} -eq 0 ]; then
            echo "هیچ فایل شخصی یافت نشد."
          else
            echo "=== دریافت زمان آخرین کامیت برای فایل‌های شخصی ==="
            tmp_file=$(mktemp)
            for f in "${personal_files[@]}"; do
              ts=$(git log -1 --format='%ct' -- "$f" 2>/dev/null || echo 0)
              echo "$ts|$f" >> "$tmp_file"
            done
            
            echo "=== مرتب‌سازی بر اساس جدیدترین کامیت (اولین) ==="
            sort -t'|' -k1 -rn "$tmp_file" | while IFS='|' read -r ts file; do
              date_str=$(date -d "@$ts" '+%Y-%m-%d %H:%M:%S' 2>/dev/null || echo "نامشخص")
              echo "$ts -> $file ($date_str)"
            done
            echo ""
            
            echo "=== افزودن فایل‌های شخصی به ترتیب (همه، بدون محدودیت) ==="
            sort -t'|' -k1 -rn "$tmp_file" | cut -d'|' -f2 > sorted_personal.txt
            while IFS= read -r file; do
              echo "  اضافه کردن $file"
              grep -E "^(vmess|vless|trojan|ss|ssr|tuic|hysteria2|socks)://" "$file" >> sub.txt 2>/dev/null || true
            done < sorted_personal.txt
          fi
          
          # ---------- اضافه کردن بهترین کانفیگ‌های خارجی ----------
          if [ -s external_best.txt ]; then
            echo "=== افزودن بهترین کانفیگ‌های خارجی ==="
            cat external_best.txt >> sub.txt
            echo "✅ تعداد کانفیگ‌های خارجی اضافه شده: $(wc -l < external_best.txt)"
          else
            echo "⚠️ هیچ کانفیگ خارجی (بهترین) برای اضافه کردن وجود ندارد."
          fi
          
          # ---------- نهایی سازی ----------
          if [ ! -s sub.txt ]; then
            echo "# هیچ کانفیگی یافت نشد" > sub.txt
          fi
          
          echo "=== تعداد کل خطوط در sub.txt: $(wc -l < sub.txt) ==="

      # ============================================
      # مرحله 5: تبدیل به base64 و commit
      # ============================================
      - name: Convert to base64
        run: |
          base64 -w 0 sub.txt > subscribe.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          base64 -w 0 sub.txt > subscribe.txt
          date +"%Y-%m-%d %H:%M:%S UTC" > .timestamp
          
          git add -f subscribe.txt .timestamp
          
          if git diff --cached --quiet; then
            echo "تغییری برای commit وجود ندارد"
          else
            git commit -m "Auto update subscription $(date +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main --no-edit || true
            git push
          fi
