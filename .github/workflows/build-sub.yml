name: Update Subscription

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download multiple external sub files
        run: |
          mkdir -p configs
          urls=(
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Subx.txt"
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Subx.txt"
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Subx.txt"
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Subx.txt"
          )
          counter=1
          for url in "${urls[@]}"; do
            filename="configs/external_${counter}.txt"
            curl -sL "$url" -o "$filename"
            echo "Downloaded $url -> $filename, lines: $(wc -l < "$filename")"
            ((counter++))
          done

      - name: Merge all configs
        run: |
          ls -la configs/
          > sub.txt
          personal_files=()
          for f in configs/*.txt; do
            if [[ ! "$f" =~ external_[0-9]+\.txt$ ]]; then
              personal_files+=("$f")
            fi
          done
          
          if [ ${#personal_files[@]} -gt 0 ]; then
            tmp_file=$(mktemp)
            for f in "${personal_files[@]}"; do
              ts=$(git log -1 --format='%ct' -- "$f" 2>/dev/null || echo 0)
              echo "$ts|$f" >> "$tmp_file"
            done
            sort -t'|' -k1 -rn "$tmp_file" | cut -d'|' -f2 > sorted_files.txt
            while IFS= read -r file; do
              cat "$file" >> sub.txt
            done < sorted_files.txt
          fi
          
          for f in configs/external_*.txt; do
            if [ -f "$f" ]; then
              cat "$f" >> sub.txt
            fi
          done
          
          if [ ! -s sub.txt ]; then
            echo "# No configs found" > sub.txt
          fi

      - name: Convert to base64
        run: base64 -w 0 sub.txt > subscribe.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add subscribe.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update subscription"
            git push
          fi
