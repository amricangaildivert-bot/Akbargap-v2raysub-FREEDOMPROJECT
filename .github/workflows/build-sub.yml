name: Build Subscription

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ============================================
      # مرحله 1: نصب ابزار xray-knife
      # ============================================
      - name: Setup xray-knife
        run: |
          wget -q https://github.com/lilendian0x00/xray-knife/releases/latest/download/Xray-knife-linux-64.zip
          unzip -q -o Xray-knife-linux-64.zip -d xray-knife
          chmod +x xray-knife/xray-knife
          sudo mv xray-knife/xray-knife /usr/local/bin/
          xray-knife --version || echo "xray-knife installed"

      # ============================================
      # مرحله 2: دانلود تمام فایل‌های خارجی (ساب لینک‌ها)
      # ============================================
      - name: Download multiple external sub files
        run: |
          mkdir -p configs
          urls=(
            "https://raw.githubusercontent.com/mahsanet/MahsaFreeConfig/refs/heads/main/mtn/sub_1.txt"
            "https://raw.githubusercontent.com/mahsanet/MahsaFreeConfig/refs/heads/main/mtn/sub_2.txt"
            "https://raw.githubusercontent.com/mahsanet/MahsaFreeConfig/refs/heads/main/mci/sub_1.txt"
