name: Build Subscription

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download external file
        run: |
          mkdir -p configs
          curl -sL "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Sub1.txt" -o configs/external.txt
          echo "Downloaded $(wc -l < configs/external.txt) lines"

      - name: Merge all configs
        run: |
          cat configs/*.txt > sub.txt
          echo "Total lines in sub.txt: $(wc -l < sub.txt)"

      - name: Convert to base64
        run: |
          base64 -w 0 sub.txt > subscribe.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add subscribe.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update subscription (no filter)"
            git pull --rebase origin main
            git push
          fi
