name: Build Subscription

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download multiple external sub files
        run: |
          mkdir -p configs
          
          # ================================
          # لیست لینک‌های ساب خود را اینجا وارد کنید
          # ================================
          urls=(
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Sub1.txt"
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Sub2.txt"
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Sub3.txt"
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Sub4.txt"
          )
          
          counter=1
          for url in "${urls[@]}"; do
            filename="configs/external_${counter}.txt"
            curl -sL "$url" -o "$filename"
            echo "Downloaded $url -> $filename, lines: $(wc -l < "$filename")"
            ((counter++))
          done

      - name: Merge all configs
        run: |
          cat configs/*.txt > sub.txt
          echo "Total lines in sub.txt: $(wc -l < sub.txt)"

      - name: Convert to base64
        run: |
          base64 -w 0 sub.txt > subscribe.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add subscribe.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update subscription (multiple sources)"
            git pull --rebase origin main
            git push
          fi
