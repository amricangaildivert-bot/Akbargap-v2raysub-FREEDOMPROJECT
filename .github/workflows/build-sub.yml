name: Build Subscription

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download multiple external sub files
        run: |
          mkdir -p configs
          
          urls=(
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Subx.txt"
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Subx.txt"
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Subx.txt"
            "https://raw.githubusercontent.com/barry-far/V2ray-config/main/Subx.txt"
          )
          
          counter=1
          for url in "${urls[@]}"; do
            filename="configs/external_${counter}.txt"
            curl -sL "$url" -o "$filename"
            echo "Downloaded $url -> $filename, lines: $(wc -l < "$filename")"
            ((counter++))
          done

      - name: Merge all configs (sort by latest commit first)
        run: |
          # پاک کردن فایل قبلی
          > sub.txt
          
          # فایل‌های شخصی (به جز external_*)
          personal_files=()
          for f in configs/*.txt; do
            if [[ ! "$f" =~ external_[0-9]+\.txt$ ]]; then
              personal_files+=("$f")
            fi
          done
          
          if [ ${#personal_files[@]} -gt 0 ]; then
            # مرتب‌سازی بر اساس آخرین زمان کامیت (جدیدترین اول)
            for f in "${personal_files[@]}"; do
              ts=$(git log -1 --format=%ct -- "$f" 2>/dev/null || echo 0)
              echo "$ts|$f"
            done | sort -t'|' -k1 -n | cut -d'|' -f2 > sorted_personal.txt
            
            while IFS= read -r file; do
              cat "$file" >> sub.txt
            done < sorted_personal.txt
          fi
          
          # اضافه کردن فایل‌های خارجی (بدون ترتیب خاص)
          for f in configs/external_*.txt; do
            if [ -f "$f" ]; then
              cat "$f" >> sub.txt
            fi
          done
          
          if [ ! -s sub.txt ]; then
            touch sub.txt
          fi
          
          echo "Total lines in sub.txt: $(wc -l < sub.txt)"

      - name: Convert to base64
        run: |
          base64 -w 0 sub.txt > subscribe.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add subscribe.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update subscription (multiple sources)"
            git pull --rebase origin main
            git push
          fi
