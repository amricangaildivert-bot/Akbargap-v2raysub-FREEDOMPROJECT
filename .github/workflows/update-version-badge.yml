name: Update Version Badge

on:
  push:
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  badge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          sed -i -E \
          "s#https://img.shields.io/badge/Version-[^-]*-[A-Za-z0-9]+\\?style=for-the-badge#https://img.shields.io/badge/Version-v${{ steps.version.outputs.version }}-blueviolet?style=for-the-badge#g" \
          README.md

      - name: Commit
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          git add README.md

          git diff --cached --quiet || \
          git commit -m "Update version badge"

          git push
